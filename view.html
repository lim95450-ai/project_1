<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <?!= include('style') ?>
</head>
<body>
  <div class="container">
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <p style="color:#94a3b8;">근무표를 불러오는 중...</p>
      </div>
    </div>
  </div>

  <?!= include('script') ?>

  <script>
    // 서버에서 전달받은 근무표 데이터 (scriptlet으로 주입)
    var scheduleData = <?!= scheduleData ?>;

    // 서버에서 전달받은 스케줄 상세 데이터를 단 한번에 렌더링합니다.
    (function() {
      if (scheduleData) {
        renderSchedule(scheduleData);
      } else {
        // Vercel 환경: URL에서 sid 또는 d 파라미터를 읽어 API 호출
        var params = {};
        var search = window.location.search;
        if (search) {
          search = search.substring(1);
          var pairs = search.split('&');
          for (var i = 0; i < pairs.length; i++) {
            var pair = pairs[i].split('=');
            var key = decodeURIComponent(pair[0]);
            var val = pair[1] ? decodeURIComponent(pair[1]) : '';
            params[key] = val;
          }
        }
        
        var sid = params.sid || '';
        var d = params.d || '';
        
        // 구글의 ?=sid 또는 ?sid 형태 지원
        if (!sid && !d) {
          if (search.length === 8) {
            sid = search;
          } else {
            for (var key in params) {
              if (key === '' && params[key].length === 8) {
                sid = params[key];
                break;
              }
              if (key.length === 8 && params[key] === '') {
                sid = key;
                break;
              }
            }
          }
        }

        if (sid) {
          callGasApi('getScheduleBySid', { sid: sid }, function(data) {
            renderSchedule(data);
          }, function(err) {
            showError('근무표 로드 실패', err.message);
          });
        } else if (d) {
          callGasApi('getScheduleByD', { d: d }, function(data) {
            renderSchedule(data);
          }, function(err) {
            showError('QR 데이터 해석 실패', err.message);
          });
        } else {
          showError('조회 오류', '조회할 근무표의 고유 SID 또는 압축 데이터가 누락되었습니다.');
        }
      }
    })();

    function showError(title, msg) {
      document.getElementById('app').innerHTML =
        '<div class="error-card">' +
          '<div class="error-icon">🔍</div>' +
          '<h2>' + escapeHtml(title) + '</h2>' +
          '<p>' + escapeHtml(msg) + '</p>' +
        '</div>';
    }
  </script>
</body>
</html>
